<!DOCTYPE html>
<html>
	<head>
		<script>
			performance.mark('code/didStartRenderer');
		</script>
		<meta charset="utf-8" />

		<!-- Mobile-specific meta tags -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="VS Code" />
		<link rel="apple-touch-icon" href="{{WORKBENCH_WEB_BASE_URL}}/resources/server/code-192.png" />

		<!-- Disable pinch zooming, lock viewport for mobile -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

		<!-- Content Security Policy
			NOTE: 'unsafe-inline' and 'unsafe-eval' are required to match the
			standard VS Code web workbench CSP. 'unsafe-eval' is needed for
			dynamic module loading. 'unsafe-inline' is needed for the inline
			performance.mark() script and loading splash below. A nonce-based
			approach would require server-side support to inject the nonce. -->
		<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' ws: wss: https: http:; worker-src 'self' blob:; frame-src 'self' https:;" />

		<!-- Theme color for browser chrome -->
		<meta name="theme-color" content="#ffffff" />

		<!-- Workbench Configuration -->
		<meta id="vscode-workbench-web-configuration" data-settings="{{WORKBENCH_WEB_CONFIGURATION}}" />

		<!-- Workbench Auth Session -->
		<meta id="vscode-workbench-auth-session" data-settings="{{WORKBENCH_AUTH_SESSION}}" />

		<!-- Workbench Icon/Manifest/CSS -->
		<link rel="icon" href="{{WORKBENCH_WEB_BASE_URL}}/resources/server/favicon.ico" type="image/x-icon" />
		<link rel="manifest" href="{{WORKBENCH_WEB_BASE_URL}}/resources/server/manifest.json" crossorigin="use-credentials" />
		<link rel="stylesheet" href="{{WORKBENCH_WEB_BASE_URL}}/out/vs/mobile/browser/mobile.css" />

		<style>
			/* Critical CSS to prevent FOUC and set safe area insets */
			html, body {
				margin: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				/* Support safe areas on iOS */
				padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
			}

			/* Prevent overscroll bounce on iOS */
			body {
				overscroll-behavior: none;
				-webkit-overflow-scrolling: touch;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: #ffffff;
			}

			/* Loading spinner shown while JS bundles download and parse */
			.mobile-loading-splash {
				position: fixed;
				top: 0; left: 0; right: 0; bottom: 0;
				background: #ffffff;
				z-index: 10000;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				color: #616161;
			}
			@media (prefers-color-scheme: dark) {
				.mobile-loading-splash {
					background: #1e1e1e;
					color: #cccccc;
				}
				.mobile-loading-splash .spinner {
					border-color: #444444;
					border-top-color: #007acc;
				}
			}
			.mobile-loading-splash .spinner {
				width: 32px; height: 32px;
				border: 3px solid #cecece;
				border-top-color: #007acc;
				border-radius: 50%;
				animation: mobile-spin 0.8s linear infinite;
			}
			.mobile-loading-splash p {
				margin-top: 12px;
				font-size: 14px;
			}
			@keyframes mobile-spin {
				to { transform: rotate(360deg); }
			}
		</style>
	</head>

	<body aria-label="VS Code Mobile">
		<div id="mobile-loading-splash" class="mobile-loading-splash">
			<div class="spinner"></div>
			<p id="mobile-loading-msg">Loading...</p>
		</div>
		<script>
			// Show a contextual loading message based on URL params.
			(function () {
				var params = new URLSearchParams(window.location.search);
				var folder = params.get('folder');
				var msgEl = document.getElementById('mobile-loading-msg');
				if (folder && msgEl) {
					var path = folder.replace(/^vscode-remote:\/\/[^/]*/, '');
					var name = path.split('/').filter(Boolean).pop() || folder;
					msgEl.textContent = 'Loading workspace ' + name + '\u2026';
				} else if (msgEl) {
					msgEl.textContent = 'Loading assets\u2026';
				}
			})();
		</script>
	</body>

	<!-- Startup (do not modify order of script tags!) -->
	<script>
		const baseUrl = new URL('{{WORKBENCH_WEB_BASE_URL}}', window.location.origin).toString();
		globalThis._VSCODE_FILE_ROOT = baseUrl + '/out/';
		globalThis._VSCODE_MOBILE_APP = true;
	</script>
	<script>
		performance.mark('code/willLoadWorkbenchMain');
	</script>
	<!-- always ensure built in english NLS messages -->
	<script type="module" src="{{WORKBENCH_NLS_FALLBACK_URL}}"></script>
	<!-- attempt to load NLS messages in case non-english -->
	<script>
		(function() {
			const nlsUrl = '{{WORKBENCH_NLS_URL}}';
			if (nlsUrl) {
				const s = document.createElement('script');
				s.type = 'module';
				s.src = nlsUrl;
				document.head.appendChild(s);
			}
		})();
	</script>
	<script type="module" src="{{WORKBENCH_WEB_BASE_URL}}/out/vs/mobile/browser/mobile.js"></script>
</html>
