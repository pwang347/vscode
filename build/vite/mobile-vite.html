<!DOCTYPE html>
<html>
	<head>
		<script>
			performance.mark('code/didStartRenderer');
		</script>
		<meta charset="utf-8" />

		<!-- Mobile-specific meta tags -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="VS Code Mobile" />

		<!-- Disable pinch zooming, lock viewport for mobile -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

		<!-- Theme color for browser chrome -->
		<meta name="theme-color" content="#ffffff" />

		<!-- Workbench Configuration -->
		<meta id="vscode-workbench-web-configuration" data-settings="{{WORKBENCH_WEB_CONFIGURATION}}">

		<!-- Workbench Auth Session -->
		<meta id="vscode-workbench-auth-session" data-settings="{{WORKBENCH_AUTH_SESSION}}">

		<!-- Builtin Extensions -->
		<meta id="vscode-workbench-builtin-extensions" data-settings="{{WORKBENCH_BUILTIN_EXTENSIONS}}">

		<style>
			html, body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
			}
			body {
				overscroll-behavior: none;
				-webkit-overflow-scrolling: touch;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: #ffffff;
			}
			.mobile-loading-splash {
				position: fixed;
				top: 0; left: 0; right: 0; bottom: 0;
				background: #ffffff;
				z-index: 10000;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				color: #616161;
			}
			.mobile-loading-splash .spinner {
				width: 32px; height: 32px;
				border: 3px solid #cecece;
				border-top-color: #007acc;
				border-radius: 50%;
				animation: mobile-spin 0.8s linear infinite;
			}
			.mobile-loading-splash p {
				margin-top: 12px;
				font-size: 14px;
			}
			@keyframes mobile-spin {
				to { transform: rotate(360deg); }
			}
		</style>
	</head>

	<body aria-label="">
		<div id="mobile-loading-splash" class="mobile-loading-splash">
			<div class="spinner"></div>
			<p id="mobile-loading-msg"></p>
		</div>
		<script>
			// TODO: have a more graceful loading experience that doesn't rely on JavaScript to show a loading message. This is just a temporary solution to provide some feedback to users while the app is loading, especially in cases where the loading time is long (e.g. remote workspaces).
			(function () {
				var params = new URLSearchParams(window.location.search);
				var folder = params.get('folder');
				var msgEl = document.getElementById('mobile-loading-msg');
				if (folder && msgEl) {
					var path = folder.replace(/^vscode-remote:\/\/[^/]*/, '');
					var name = path.split('/').filter(Boolean).pop() || folder;
					msgEl.textContent = 'Loading workspace ' + name + '\u2026';
				} else if (msgEl) {
					msgEl.textContent = 'Loading assets\u2026';
				}
			})();
		</script>
	</body>

	<!-- Startup -->
	<script>
		globalThis._VSCODE_FILE_ROOT = new URL('./out/', window.location.origin).href;
		globalThis._VSCODE_MOBILE_APP = true;
		// TODO: remove these handlers once we have proper error handling in place. This is to catch errors that would otherwise be swallowed and leave no indication of what went wrong.
		window.addEventListener('error', function(e) {
			if (e.error && e.error.message && e.error.message.indexOf('before initialization') !== -1) {
				var msg = e.error.message + '\n\nStack:\n' + (e.error.stack || 'no stack');
				console.error('[Unhandled Error]', msg);
				alert(e.error.message + '\nFile: ' + e.filename + ':' + e.lineno + ':' + e.colno);
			}
		});
		window.addEventListener('unhandledrejection', function(e) {
			if (e.reason && e.reason.message && e.reason.message.indexOf('before initialization') !== -1) {
				console.error('[Unhandled Rejection]', e.reason.message, e.reason.stack);
				alert(e.reason.message + '\nStack: ' + (e.reason.stack || 'none').substring(0, 500));
			}
		});
	</script>
	<script type="module" src="./index-mobile.ts"></script>
</html>
